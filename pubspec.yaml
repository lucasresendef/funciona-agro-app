name: field_management_app
description: Frontend mobile e tablet para gerenciamento de insumos, fazendas e operações de campo.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  riverpod: ^3.2.1
  go_router: ^17.2.0
  dio: ^5.9.2
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  flutter_secure_storage: ^10.0.0
  local_auth: ^2.3.0
  intl: ^0.20.2
  formz: ^0.8.0
  google_fonts: ^8.0.2
  collection: ^1.19.1
  path_provider: ^2.1.5
  share_plus: ^12.0.2
  open_filex: ^4.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.13.1
  freezed: ^3.2.5
  json_serializable: ^6.13.1
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - lib/assets/icon/
    - lib/assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "lib/assets/icon/icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "lib/assets/icon/icon.png"
    background_color: "#ffffff"
    theme_color: "#047857"
  windows:
    generate: true
    image_path: "lib/assets/icon/icon.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "lib/assets/icon/icon.png"

flutter_native_splash:
  color: "#ffffff"
  image: lib/assets/icon/icon.png
  android: true
  ios: true
